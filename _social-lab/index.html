<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Lab — ITR</title>
    <!-- Fontes Premium -->
    <link
        href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&f[]=general-sans@400,500,600,700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'General Sans', sans-serif;
            background: #030712;
            color: #f8fafc;
            margin: 0;
            padding: 60px 40px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header h1 {
            font-family: 'Satoshi', sans-serif;
            font-size: 36px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.03em;
            color: #fff;
        }

        .badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            letter-spacing: 0.02em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 30px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .card:hover {
            border-color: #334155;
            transform: translateY(-4px);
            background: #111827;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .c-title {
            font-family: 'Satoshi', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .c-title svg {
            color: #64748b;
            transition: color 0.2s, transform 0.2s;
        }

        .card:hover .c-title svg {
            color: #10b981;
            transform: translateX(4px);
        }

        .c-desc {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
            flex-grow: 1;
        }

        .c-meta {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
        }

        .c-format {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .c-slides {
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="header">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
            <line x1="9" y1="3" x2="9" y2="18"></line>
            <line x1="15" y1="6" x2="15" y2="21"></line>
        </svg>
        <h1>ITR Social Lab</h1>
        <span class="badge">Templates & Exportação</span>
    </div>

    <div class="grid">
        <a href="/_social-lab/posts/001-o-que-e-o-itr.html" class="card">
            <div class="c-title">
                001-o-que-e-o-itr
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
            </div>
            <div class="c-desc">Carrossel completo de fundo escuro focado no método ITR e na quebra da tradução mental
                para aprendizado acelerado.</div>
            <div class="c-meta">
                <span class="c-format">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <line x1="9" y1="3" x2="9" y2="21" />
                    </svg>
                    Carrossel (1080x1080)
                </span>
                <span class="c-slides">7 slides</span>
            </div>
        </a>

        <!-- Futuros templates entrarão aqui -->
    </div>
</body>

</html>
